# Microservice deployment: search is extracted into a separate service.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.microservice.yml up -d
#
# This overlays on the base docker-compose.yml:
# - Adds search-service (port 8001)
# - Overrides backend to use DEPLOY_MODE=microservice

services:
  search-service:
    container_name: pubmed-rag-search
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-pubmed_abstracts}
    command: ["uv", "run", "uvicorn", "src.search_service.main:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    environment:
      DEPLOY_MODE: microservice
      SEARCH_SERVICE_URL: http://search-service:8001
    depends_on:
      milvus:
        condition: service_healthy
      search-service:
        condition: service_healthy
